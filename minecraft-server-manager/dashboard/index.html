<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e0e0e0;
            --text-secondary: #8a8a9a;
            --accent-green: #4ecca3;
            --accent-red: #e74c3c;
            --accent-blue: #00b4d8;
            --accent-gold: #f0a500;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .header-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: right;
        }

        .header-meta span { color: var(--accent-gold); }

        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        /* Summary cards row */
        .summary {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .summary-card .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .summary-card .value.small { font-size: 1.1rem; }

        /* Section headings */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid var(--border);
        }

        /* Server cards grid */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .server-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .server-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .server-card-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
        }

        .status-badge.online {
            background: rgba(78, 204, 163, 0.15);
            color: var(--accent-green);
        }

        .status-badge.offline {
            background: rgba(231, 76, 60, 0.15);
            color: var(--accent-red);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-badge.online .status-dot { background: var(--accent-green); }
        .status-badge.offline .status-dot { background: var(--accent-red); }

        .server-detail {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            font-size: 0.85rem;
        }

        .server-detail .key { color: var(--text-secondary); }

        /* Card tabs */
        .card-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .card-tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.65rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .card-tab:hover { color: var(--text-primary); }

        .card-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Update history table */
        .history-section { margin-bottom: 1.5rem; }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .history-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .history-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .history-table tr:hover td {
            background: rgba(15, 52, 96, 0.4);
        }

        .version-tag {
            color: var(--accent-gold);
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: 600;
        }

        /* Log viewer */
        .log-section { margin-bottom: 1.5rem; }

        .log-container {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            max-height: 350px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.5;
        }

        .log-line { white-space: pre-wrap; word-break: break-all; }
        .log-timestamp { color: var(--accent-blue); }
        .log-message { color: var(--text-primary); }

        .log-line.error .log-message { color: var(--accent-red); }
        .log-line.warning .log-message { color: var(--accent-gold); }

        .log-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.4rem;
            text-align: right;
        }

        /* Error / empty states */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .error-banner {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            color: var(--accent-red);
            font-size: 0.85rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Edit mode */
        .card-actions {
            display: flex;
            gap: 0.4rem;
        }

        .edit-btn, .history-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .edit-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .history-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .running-warning {
            background: rgba(240, 165, 0, 0.15);
            border: 1px solid var(--accent-gold);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.75rem;
            color: var(--accent-gold);
            font-size: 0.78rem;
        }

        .edit-form { display: flex; flex-direction: column; gap: 0.35rem; }

        .edit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2rem 0;
            font-size: 0.85rem;
        }

        .edit-label { color: var(--text-secondary); flex-shrink: 0; }

        .edit-input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            font-size: 0.82rem;
            width: 140px;
            text-align: right;
        }

        .edit-input:focus { outline: none; border-color: var(--accent-blue); }

        select.edit-input { cursor: pointer; }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider { background: rgba(78, 204, 163, 0.3); border-color: var(--accent-green); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--accent-green); }

        .edit-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            justify-content: flex-end;
        }

        .btn-save, .btn-cancel {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-save { background: var(--accent-green); color: #0d1117; }
        .btn-cancel { background: var(--border); color: var(--text-primary); }
        .btn-save:hover, .btn-cancel:hover { opacity: 0.85; }
        .btn-save:disabled, .btn-cancel:disabled { opacity: 0.5; cursor: not-allowed; }

        /* History panel */
        .history-panel {
            border-top: 1px solid var(--border);
            margin-top: 0.75rem;
            padding-top: 0.75rem;
        }

        .history-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .history-entry {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.65rem;
            margin-bottom: 0.4rem;
            font-size: 0.78rem;
        }

        .history-entry.reverted { opacity: 0.6; }

        .history-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }

        .history-time { color: var(--text-secondary); font-size: 0.72rem; }

        .history-changes { display: flex; flex-direction: column; gap: 0.15rem; }

        .history-change { color: var(--text-primary); }
        .history-key { color: var(--accent-blue); font-weight: 600; }

        .undo-btn, .redo-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.68rem;
            padding: 0.15rem 0.45rem;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .undo-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }
        .redo-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }

        @media (max-width: 600px) {
            .summary { flex-direction: column; }
            header { flex-direction: column; gap: 0.5rem; }
            .header-meta { text-align: left; }
            main { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Minecraft Bedrock Server Dashboard</h1>
        <div class="header-meta">
            <div>Version: <span id="header-version">--</span></div>
            <div>Last refreshed: <span id="header-refresh">--</span></div>
        </div>
    </header>

    <main>
        <div id="error-container"></div>

        <div class="summary" id="summary-section">
            <div class="summary-card">
                <div class="label">Current Version</div>
                <div class="value" id="summary-version">--</div>
            </div>
            <div class="summary-card">
                <div class="label">Servers</div>
                <div class="value" id="summary-servers">--</div>
            </div>
            <div class="summary-card">
                <div class="label">Online</div>
                <div class="value" id="summary-online">--</div>
            </div>
            <div class="summary-card">
                <div class="label">Players Online</div>
                <div class="value" id="summary-players">--</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Updates</div>
                <div class="value" id="summary-updates">--</div>
            </div>
        </div>

        <h2 class="section-title">Servers</h2>
        <div class="server-grid" id="server-grid">
            <div class="empty-state">Loading...</div>
        </div>

        <div class="history-section">
            <h2 class="section-title">Update History</h2>
            <div id="history-container">
                <div class="empty-state">Loading...</div>
            </div>
        </div>

        <div class="log-section">
            <h2 class="section-title">Recent Logs</h2>
            <div class="log-container" id="log-container">
                <div class="empty-state">Loading...</div>
            </div>
            <div class="log-meta" id="log-meta"></div>
        </div>
    </main>

    <script>
        async function fetchJson(endpoint) {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error(`${endpoint}: HTTP ${res.status}`);
            return res.json();
        }

        function showError(msg) {
            document.getElementById('error-container').innerHTML =
                `<div class="error-banner">Dashboard error: ${escapeHtml(msg)}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function renderConfig(config) {
            document.getElementById('summary-version').textContent = config.currentMinecraftVersion;
            document.getElementById('header-version').textContent = config.currentMinecraftVersion;
        }

        function formatRelativeTime(isoString) {
            if (!isoString) return '--';
            const diff = Date.now() - new Date(isoString).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function formatSize(mb) {
            if (mb >= 1024) return `${(mb / 1024).toFixed(1)} GB`;
            return `${mb.toFixed(1)} MB`;
        }

        function switchTab(card, tabName) {
            card.querySelectorAll('.card-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
            card.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tabName));
        }

        function renderServers(data) {
            const grid = document.getElementById('server-grid');
            const servers = data.servers || [];

            document.getElementById('summary-servers').textContent = servers.length;
            const onlineCount = servers.filter(s => !!s.query).length;
            const totalPlayers = servers.reduce((sum, s) => sum + (s.query ? s.query.onlinePlayers : 0), 0);
            const el = document.getElementById('summary-online');
            el.textContent = `${onlineCount} / ${servers.length}`;
            el.style.color = onlineCount > 0 ? 'var(--accent-green)' : 'var(--accent-red)';
            const playersEl = document.getElementById('summary-players');
            playersEl.textContent = totalPlayers;
            playersEl.style.color = totalPlayers > 0 ? 'var(--accent-green)' : '';

            if (!servers.length) {
                grid.innerHTML = '<div class="empty-state">No servers found</div>';
                return;
            }

            // Store server data globally for edit-properties.js
            window._serverData = {};
            servers.forEach(s => { window._serverData[s.name] = s; });

            grid.innerHTML = servers.map(s => {
                const q = s.query;
                const isOnline = !!q;
                const statusClass = isOnline ? 'online' : 'offline';
                const statusText = isOnline ? 'Online' : 'Offline';
                const players = isOnline ? `${q.onlinePlayers} / ${q.maxPlayers}` : '--';
                const playersColor = isOnline && q.onlinePlayers > 0 ? 'var(--accent-green)' : '';

                return `
                <div class="server-card" data-server="${escapeHtml(s.name)}">
                    <div class="server-card-header">
                        <h3>${escapeHtml(s.name)}</h3>
                        <div class="card-actions">
                            <button class="edit-btn" onclick="enterEditMode(this.closest('.server-card'), window._serverData['${escapeHtml(s.name)}'])">Edit</button>
                            <button class="history-btn" onclick="toggleHistoryPanel(this.closest('.server-card'), '${escapeHtml(s.name)}')">History</button>
                            <span class="status-badge ${statusClass}">
                                <span class="status-dot"></span>
                                ${statusText}
                            </span>
                        </div>
                    </div>
                    <div class="card-tabs">
                        <button class="card-tab active" data-tab="status" onclick="switchTab(this.closest('.server-card'), 'status')">Status</button>
                        <button class="card-tab" data-tab="world" onclick="switchTab(this.closest('.server-card'), 'world')">World</button>
                        <button class="card-tab" data-tab="config" onclick="switchTab(this.closest('.server-card'), 'config')">Config</button>
                    </div>
                    <div class="tab-panel active" data-tab="status">
                        <div class="server-detail"><span class="key">Players</span><span style="color:${playersColor};font-weight:600">${players}</span></div>
                        <div class="server-detail"><span class="key">Version</span><span class="version-tag">${escapeHtml(isOnline ? q.version : s.version)}</span></div>
                        <div class="server-detail"><span class="key">Gamemode</span><span>${escapeHtml(isOnline ? q.gamemode : s.gamemode)}</span></div>
                        <div class="server-detail"><span class="key">Difficulty</span><span>${escapeHtml(s.difficulty)}</span></div>
                        ${isOnline ? `<div class="server-detail"><span class="key">World</span><span>${escapeHtml(q.worldName)}</span></div>` : ''}
                    </div>
                    <div class="tab-panel" data-tab="world">
                        <div class="server-detail"><span class="key">Level Name</span><span>${escapeHtml(s.levelName)}</span></div>
                        <div class="server-detail"><span class="key">World Size</span><span>${formatSize(s.worldSizeMB || 0)}</span></div>
                        <div class="server-detail"><span class="key">Last Save</span><span>${formatRelativeTime(s.lastSave)}</span></div>
                        <div class="server-detail"><span class="key">View Distance</span><span>${s.viewDistance || '--'} chunks</span></div>
                        <div class="server-detail"><span class="key">Tick Distance</span><span>${s.tickDistance || '--'} chunks</span></div>
                    </div>
                    <div class="tab-panel" data-tab="config">
                        <div class="server-detail"><span class="key">Port</span><span>${s.serverPort}</span></div>
                        <div class="server-detail"><span class="key">Port v6</span><span>${s.serverPortV6}</span></div>
                        <div class="server-detail"><span class="key">Allow Cheats</span><span>${s.allowCheats}</span></div>
                        <div class="server-detail"><span class="key">Online Mode</span><span>${s.onlineMode}</span></div>
                        <div class="server-detail"><span class="key">Permission Level</span><span>${escapeHtml(s.defaultPermission)}</span></div>
                        <div class="server-detail"><span class="key">Allow List</span><span>${s.allowList}</span></div>
                    </div>
                </div>
            `}).join('');
        }

        function renderHistory(history) {
            const container = document.getElementById('history-container');
            const totalUpdates = history.reduce((sum, h) => sum + h.TimesUpdated, 0);
            document.getElementById('summary-updates').textContent = totalUpdates;

            if (!history.length) {
                container.innerHTML = '<div class="empty-state">No update history</div>';
                return;
            }

            const rows = history.slice().reverse().map(h => `
                <tr>
                    <td><span class="version-tag">${escapeHtml(h.Version)}</span></td>
                    <td>${escapeHtml(h.FirstUpdatedAt)}</td>
                    <td>${escapeHtml(h.LastUpdatedAt)}</td>
                    <td>${h.TimesUpdated}</td>
                </tr>
            `).join('');

            container.innerHTML = `
                <table class="history-table">
                    <thead><tr>
                        <th>Version</th>
                        <th>First Updated</th>
                        <th>Last Updated</th>
                        <th>Times</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderLogs(data) {
            const container = document.getElementById('log-container');
            const meta = document.getElementById('log-meta');

            if (!data.lines.length) {
                container.innerHTML = '<div class="empty-state">No logs available</div>';
                meta.textContent = '';
                return;
            }

            container.innerHTML = data.lines.map(line => {
                const match = line.match(/^(\[.+?\])\s(.+)$/);
                const isError = /error/i.test(line);
                const isWarning = /warning/i.test(line);
                const cls = isError ? ' error' : isWarning ? ' warning' : '';

                if (match) {
                    return `<div class="log-line${cls}"><span class="log-timestamp">${escapeHtml(match[1])}</span> <span class="log-message">${escapeHtml(match[2])}</span></div>`;
                }
                return `<div class="log-line${cls}"><span class="log-message">${escapeHtml(line)}</span></div>`;
            }).join('');

            meta.textContent = `Showing last ${data.lines.length} of ${data.totalLines} log lines`;

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function updateTimestamp() {
            document.getElementById('header-refresh').textContent =
                new Date().toLocaleTimeString();
        }

        // --- WebSocket Connection ---

        let ws = null;
        let reconnectAttempts = 0;
        let pendingRefresh = null;

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}`);

            ws.onopen = () => {
                reconnectAttempts = 0;
                clearError();
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    switch (msg.type) {
                        case 'init':
                        case 'update':
                            clearError();
                            renderConfig(msg.config);
                            renderServers(msg.servers);
                            renderHistory(msg.history);
                            renderLogs(msg.logs);
                            updateTimestamp();
                            if (pendingRefresh) {
                                const resolve = pendingRefresh;
                                pendingRefresh = null;
                                resolve();
                            }
                            break;
                        case 'live-reload':
                            location.reload();
                            break;
                        case 'error':
                            showError(msg.message);
                            break;
                    }
                } catch (err) {
                    console.error('WebSocket message error:', err);
                }
            };

            ws.onclose = () => {
                ws = null;
                scheduleReconnect();
            };

            ws.onerror = () => {};
        }

        function scheduleReconnect() {
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
            showError(`Connection lost. Reconnecting in ${Math.round(delay / 1000)}s...`);
            setTimeout(connectWebSocket, delay);
        }

        // Promise-based refresh for edit-properties.js compatibility
        async function refresh() {
            return new Promise((resolve) => {
                pendingRefresh = resolve;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'request-refresh' }));
                } else {
                    pendingRefresh = null;
                    resolve();
                }
                setTimeout(() => {
                    if (pendingRefresh === resolve) {
                        pendingRefresh = null;
                        resolve();
                    }
                }, 5000);
            });
        }

        document.addEventListener('DOMContentLoaded', connectWebSocket);
    </script>
    <script src="/js/edit-properties.js"></script>
</body>
